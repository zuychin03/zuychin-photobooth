<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="theme-color" content="#0c0a09" />
    <title>Offline — Zuychin Photobooth</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0c0a09;
        color: #fafaf9;
        font-family: ui-sans-serif, system-ui, sans-serif;

      img { height: 3.5rem; margin-bottom: 1.25rem; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0; color: #a8a29e; line-height: 1.5; }

    </style>

  <body>
    <main>
      <img src="/favicon.svg" alt="" />
      <h1>You&rsquo;re offline</h1>
      <p>
        Live rooms and the Shared Vault need a connection, but the
        <a href="/booth">solo booth</a> keeps working if you&rsquo;ve opened it before.
        Your shots stay on this device until you&rsquo;re back online.
      </p>
    </main>
